
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>HCM Lead Map</title>

<link href="https://api.mapbox.com/mapbox-gl-js/v3.5.1/mapbox-gl.css" rel="stylesheet"/>

<style>
html,body{
margin:0;
height:100%;
font-family:Inter,Arial,sans-serif;
background:#f8fafc;
}

#map{
position:absolute;
inset:0;
}

.sidebar{
position:absolute;
top:15px;
left:15px;
z-index:999;
width:300px;
background:#fff;
border-radius:20px;
padding:18px;
box-shadow:0 10px 30px rgba(0,0,0,.15);
}

.logo{
font-size:24px;
font-weight:700;
}

.count{
margin-top:8px;
color:#64748b;
}

.mapboxgl-popup-content{
padding:0 !important;
border-radius:20px !important;
overflow:hidden;
}

.popup{
width:340px;
background:white;
}

.popup-head{
padding:16px;
}

.badges{
display:flex;
flex-wrap:wrap;
gap:6px;
margin-bottom:12px;
}

.badge{
padding:6px 12px;
border-radius:999px;
font-size:12px;
font-weight:600;
}

.blue{
background:#2563eb;
color:white;
}

.light{
background:#eef2ff;
color:#2563eb;
}

.street{
font-size:22px;
font-weight:700;
margin-bottom:5px;
}

.addr{
font-size:14px;
color:#64748b;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
border-top:1px solid #eee;
border-bottom:1px solid #eee;
}

.box{
padding:14px;
}

.box:nth-child(2),
.box:nth-child(4){
border-left:1px solid #eee;
}

.box:nth-child(3),
.box:nth-child(4){
border-top:1px solid #eee;
}

.label{
font-size:12px;
color:#64748b;
margin-bottom:6px;
}

.value{
font-size:22px;
font-weight:700;
}

.footer{
padding:15px;
}

.btn{
display:block;
padding:14px;
text-align:center;
border-radius:14px;
text-decoration:none;
font-weight:700;
background:linear-gradient(90deg,#ff3b82,#ff6a55);
color:white;
}
</style>
</head>

<body>

<div class="sidebar">

<div class="logo">📍 Vietnam Lead Map</div>

<select id="citySelect" style="
width:100%;
margin-top:10px;
padding:10px;
border-radius:10px;
border:1px solid #ddd;
">

<option value="hcm-full.csv">Hồ Chí Minh</option>
<option value="ha-noi.csv">Hà Nội</option>
<option value="da-nang.csv">Đà Nẵng</option>
<option value="dong-nai.csv">Đồng Nai</option>
<option value="binh-duong.csv">Bình Dương</option>
<option value="can-tho.csv">Cần Thơ</option>
<option value="hai-phong.csv">Hải Phòng</option>
<option value="an-giang.csv">An Giang</option>
<option value="bac-giang.csv">Bắc Giang</option>
<option value="bac-ninh.csv">Bắc Ninh</option>
<option value="hai-duong.csv">Hải Dương</option>
<option value="hung-yen.csv">Hưng Yên</option>
<option value="khanh-hoa.csv">Khánh Hòa</option>
<option value="long-an.csv">Long An</option>
<option value="nghe-an.csv">Nghệ An</option>
<option value="quang-nam.csv">Quảng Nam</option>
<option value="quang-ngai.csv">Quảng Ngãi</option>
<option value="tay-ninh.csv">Tây Ninh</option>
<option value="thai-binh.csv">Thái Bình</option>
<option value="thanh-hoa.csv">Thanh Hóa</option>
<option value="thua-thien-hue.csv">Thừa Thiên Huế</option>
<option value="vinh-long.csv">Vĩnh Long</option>

</select>

<div id="count" class="count">Loading...</div>

</div>

<div id="map"></div>

<script src="https://api.mapbox.com/mapbox-gl-js/v3.5.1/mapbox-gl.js"></script>

<script>

mapboxgl.accessToken =
"pk.eyJ1IjoiamFja2RvYW4iLCJhIjoiY21xcXhteHBpMGpoaTJwb29jeW55cnNkcCJ9.3A2FH2ggqtAiQJXfYpqXiQ";

const GITHUB_BASE =
"https://raw.githubusercontent.com/kiviwork123-hub/lead-map-data/main/";

const CITY_CENTER = {
"hcm-full.csv":[106.7009,10.7769],
"ha-noi.csv":[105.8542,21.0285],
"da-nang.csv":[108.2022,16.0544],
"dong-nai.csv":[106.8240,10.9453],
"binh-duong.csv":[106.6570,11.3254],
"can-tho.csv":[105.7469,10.0452],
"hai-phong.csv":[106.6881,20.8449]
};

function csvToGeoJSON(text){

const lines=text.trim().split("\n");

const features=[];

for(let i=1;i<lines.length;i++){

const row=lines[i].split(",");

if(row.length<10) continue;

const lat=parseFloat(row[0]);
const lng=parseFloat(row[1]);

if(isNaN(lat)||isNaN(lng)) continue;

features.push({
type:"Feature",
geometry:{
type:"Point",
coordinates:[lng,lat]
},
properties:{
bank:row[2]||"",
tail3:row[3]||"",
trans:row[4]||"",
note:row[5]||"",
pic:row[6]||"",
district:row[7]||"",
ward:row[8]||"",
street:row[9]||""
}
});

}

return {
type:"FeatureCollection",
features
};

}
function getSelectedCSV(){

return (
GITHUB_BASE +
document.getElementById("citySelect").value
);

}
function loadProvince(file){

fetch(GITHUB_BASE + file)
.then(r=>r.text())
.then(text=>{

const geojson = csvToGeoJSON(text);

document.getElementById("count").innerHTML =
geojson.features.length.toLocaleString() + " leads";

if(map.getSource("leads")){

map.getSource("leads").setData(geojson);

return;
}

});
}

fetch(getSelectedCSV())
.then(r=>r.text())
.then(text=>{

const geojson = csvToGeoJSON(text);

document.getElementById("count").innerHTML =
geojson.features.length.toLocaleString() + " leads";

map.on("load",()=>{

map.addSource("leads",{
type:"geojson",
data:geojson,
cluster:true,
clusterRadius:50,
clusterMaxZoom:14
});

map.addLayer({
id:"clusters",
type:"circle",
source:"leads",
filter:["has","point_count"],
paint:{
"circle-color":"#2563eb",
"circle-radius":[
"step",
["get","point_count"],
18,
100,
25,
1000,
35
]
}
});

map.addLayer({
id:"cluster-count",
type:"symbol",
source:"leads",
filter:["has","point_count"],
layout:{
"text-field":["get","point_count_abbreviated"],
"text-size":12
}
});

map.addLayer({
id:"points",
type:"circle",
source:"leads",
filter:["!",["has","point_count"]],
paint:{
"circle-color":"#ff4d6d",
"circle-radius":6,
"circle-stroke-width":1,
"circle-stroke-color":"white"
}
});

map.on("click","clusters",(e)=>{

const feature =
map.queryRenderedFeatures(
e.point,
{layers:["clusters"]}
)[0];

const clusterId =
feature.properties.cluster_id;

map.getSource("leads")
.getClusterExpansionZoom(
clusterId,
(err,zoom)=>{

if(err) return;

map.easeTo({
center:feature.geometry.coordinates,
zoom
});

});

});

map.on("click","points",(e)=>{

const p = e.features[0].properties;

const lng = e.lngLat.lng;
const lat = e.lngLat.lat;

new mapboxgl.Popup({
maxWidth:"360px"
})
.setLngLat([lng,lat])
.setHTML(`
<div class="popup">

<div class="popup-head">

<div class="badges">
<span class="badge light">VietQR</span>
<span class="badge blue">${p.bank}</span>
<span class="badge blue">${p.tail3}</span>
</div>

<div class="street">
${p.street || "-"}
</div>

<div class="addr">
${p.ward || ""} ${p.district || ""}
</div>

</div>

<div class="grid">

<div class="box">
<div class="label">GHI CHÚ</div>
<div>${p.note || "-"}</div>
</div>

<div class="box">
<div class="label">PIC</div>
<div>${p.pic || "-"}</div>
</div>

<div class="box">
<div class="label">SỐ GD</div>
<div class="value">${p.trans || "-"}</div>
</div>

<div class="box">
<div class="label">NGÂN HÀNG</div>
<div>${p.bank}</div>
</div>

</div>

<div class="footer">
<a
class="btn"
target="_blank"
href="https://www.google.com/maps?q=${lat},${lng}">
📍 Mở Google Maps
</a>
</div>

</div>
`)
.addTo(map);

});

});

})
.catch(err=>{
console.error(err);
alert("Không tải được CSV");
});
document
.getElementById("citySelect")
.addEventListener("change",(e)=>{

const file = e.target.value;

loadProvince(file);

if(CITY_CENTER[file]){

map.flyTo({
center:CITY_CENTER[file],
zoom:11
});

}

});
<script>

let myMarker = null;

const gpsBtn = document.createElement("button");
gpsBtn.innerHTML = "📍 Vị trí của tôi";

gpsBtn.style.position = "absolute";
gpsBtn.style.right = "15px";
gpsBtn.style.bottom = "100px";
gpsBtn.style.zIndex = "999";
gpsBtn.style.padding = "12px 16px";
gpsBtn.style.border = "none";
gpsBtn.style.borderRadius = "12px";
gpsBtn.style.background = "#2563eb";
gpsBtn.style.color = "#fff";
gpsBtn.style.fontWeight = "600";
gpsBtn.style.boxShadow = "0 4px 12px rgba(0,0,0,.2)";

document.body.appendChild(gpsBtn);

gpsBtn.onclick = () => {

  if (!navigator.geolocation) {
    alert("Thiết bị không hỗ trợ GPS");
    return;
  }

  navigator.geolocation.getCurrentPosition(
    (pos) => {

      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;

      if (myMarker) {
        myMarker.remove();
      }

      myMarker = new mapboxgl.Marker({
        color: "#2563eb"
      })
      .setLngLat([lng, lat])
      .addTo(map);

      map.flyTo({
        center: [lng, lat],
        zoom: 17,
        essential: true
      });

    },
    (err) => {
      alert("Vui lòng bật quyền vị trí");
      console.log(err);
    },
    {
      enableHighAccuracy: true
    }
  );
};

</script>
</body>
</html>
